<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBM Leading Indicator - 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f0f5fa; --surface: #fff; --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.12);
  --text: #1a2332; --text2: #4a5568; --text3: #9aa5b4;
  --blue: #1e88e5; --blue-light: #42a5f5; --blue-pale: #e3f2fd; --blue-dark: #1565c0;
  --header-bg: #1e88e5; --ytd-bg: #fff3e0; --ytd-text: #e65100; --ytd-header: #ef6c00;
  --fy-bg: #e8f5e9; --fy-text: #2e7d32; --radius: 10px; --radius-lg: 14px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
.logo-img { height: 32px; width: auto; display: block; }
.header-right { display: flex; align-items: center; gap: 10px; }
#last-updated { font-size: 11px; color: var(--text3); }
.refresh-btn { font-size: 11px; padding: 5px 11px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; }
.refresh-btn:hover { background: var(--blue-pale); }

main { padding: 24px 24px 48px; max-width: 1200px; margin: 0 auto; }
.page-title { font-size: 26px; font-weight: 700; color: var(--blue); margin-bottom: 20px; letter-spacing: -0.02em; }

/* TABLE */
.table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead tr { background: var(--header-bg); }
thead th { padding: 11px 14px; font-weight: 600; font-size: 11px; color: #fff; text-align: center; white-space: nowrap; letter-spacing: 0.03em; border-right: 1px solid rgba(255,255,255,0.15); line-height: 1.3; }
thead th:first-child { text-align: left; min-width: 180px; padding-left: 16px; }
thead th.th-fy { background: rgba(0,0,0,0.15); min-width: 70px; }
thead th.th-ytd { background: var(--ytd-header); min-width: 90px; border-right: none; }
thead th.th-week { min-width: 52px; }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody tr:nth-child(even) { background: #fafcff; }
tbody tr:hover { background: var(--blue-pale); }
tbody td { padding: 10px 14px; text-align: center; color: var(--text2); border-right: 1px solid var(--border); white-space: nowrap; }
tbody td:first-child { text-align: left; font-weight: 500; color: var(--text); border-right: 2px solid var(--border2); padding-left: 16px; white-space: normal; line-height: 1.4; }
.row-num { color: var(--text3); font-weight: 400; margin-right: 5px; font-size: 11px; }
td.td-fy { background: var(--fy-bg); font-weight: 600; color: var(--fy-text); border-right: 2px solid rgba(0,0,0,0.08); }
td.td-ytd { background: var(--ytd-bg); font-weight: 700; color: var(--ytd-text); border-right: none; }
td.td-zero { color: #c5cdd8; }

/* FOOTER */
.table-footer { display: flex; align-items: center; justify-content: flex-end; padding: 9px 16px; border-top: 1px solid var(--border); gap: 8px; background: #fafcff; }
.page-info { font-size: 11.5px; color: var(--text3); }
.page-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.page-btn:hover:not(:disabled) { background: var(--blue-pale); color: var(--blue); }
.page-btn:disabled { opacity: 0.3; cursor: default; }

/* CHARTS */
.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
.num-card, .donut-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 16px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.chart-card-title { font-size: 12px; font-weight: 600; color: var(--blue); text-align: center; margin-bottom: 14px; line-height: 1.4; }
.num-inner { background: #f0f8ff; border-radius: var(--radius); padding: 22px 28px; text-align: center; width: 100%; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
.num-label { font-size: 11px; font-weight: 600; color: var(--blue-light); text-transform: uppercase; letter-spacing: 0.07em; }
.num-value { font-size: 38px; font-weight: 700; color: var(--blue); line-height: 1; }
.donut-wrap { position: relative; width: 150px; height: 150px; }
.donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; width: 90px; }
.donut-center-label { display: block; font-size: 10px; color: var(--text3); font-weight: 500; margin-bottom: 2px; }
.donut-center-value { font-size: 22px; font-weight: 700; color: var(--blue-dark); line-height: 1; }
.donut-legend { display: flex; justify-content: center; gap: 14px; margin-top: 12px; font-size: 11px; color: var(--text3); }
.donut-legend-item { display: flex; align-items: center; gap: 4px; }
.donut-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* LOADING/ERROR */
.loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 14px; }
.spinner { width: 30px; height: 30px; border: 2.5px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.65s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text3); }
.error-box { background: #fef2f2; border: 1px solid rgba(220,38,38,0.18); border-radius: var(--radius-lg); padding: 22px 26px; margin: 20px 0; }
.error-title { font-size: 13px; font-weight: 600; color: #dc2626; margin-bottom: 6px; }
.error-msg { font-size: 12px; color: var(--text2); line-height: 1.65; }

@media (max-width: 640px) {
  main { padding: 14px 14px 40px; }
  .page-title { font-size: 19px; }
  .charts-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .donut-wrap { width: 120px; height: 120px; }
  .donut-center-value { font-size: 17px; }
  .num-value { font-size: 30px; }
}
</style>
</head>

<main>
  <div id="loading-state" class="loading-state">
    <div class="spinner"></div>
    <div class="loading-text">Loading live data from Google Sheets…</div>
  </div>
  <div id="error-state" style="display:none"></div>
  <div id="dashboard" style="display:none">
    <div class="page-title">CBM Leading Indicator - 2026</div>
    <div class="table-card">
      <div class="table-scroll">
        <table aria-label="CBM Leading Indicator table">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="table-footer">
        <span class="page-info" id="page-info"></span>
        <button class="page-btn" id="btn-prev" onclick="changePage(-1)">&#8249;</button>
        <button class="page-btn" id="btn-next" onclick="changePage(1)">&#8250;</button>
      </div>
    </div>
    <div class="charts-grid" id="charts-grid"></div>
  </div>
</main>

<script>
// TABLE sheet gid=1116424386, BOTTOM DATA sheet gid=1318273453
const TABLE_CSV  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS7BXWboA0f-czP-q2CPyjl-MI6IV9YdTUp5iATTPl-bIOTLyRAu3SbSvVnEp9y5gZZNa-8MGcZPYcn/pub?gid=1116424386&single=true&output=csv';
const BOTTOM_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS7BXWboA0f-czP-q2CPyjl-MI6IV9YdTUp5iATTPl-bIOTLyRAu3SbSvVnEp9y5gZZNa-8MGcZPYcn/pub?gid=1318273453&single=true&output=csv';
const MAX_WEEKS = 12;

let tHeaders = [], tRows = [];
let weekCols = [], fixedLeft = [], fixedRight = [];
let currentPage = 0, totalPages = 1;

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  function split(line) {
    const vals = []; let cur = '', inQ = false;
    for (const ch of line + ',') {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.replace(/^"|"$/g,'').trim()); cur = ''; }
      else { cur += ch; }
    }
    return vals;
  }
  return { headers: split(lines[0]), rows: lines.slice(1).map(split).filter(r => r.some(v => v !== '')) };
}

function classifyColumns(headers) {
  weekCols = []; fixedLeft = []; fixedRight = [];
  headers.forEach((h, i) => {
    const hl = h.toLowerCase().trim();
    if (i === 0) { fixedLeft.push(i); return; }
    if (hl.includes('ytd') || hl.includes('accumul')) { fixedRight.push(i); return; }
    // Pure integers = week columns
    if (/^\d+$/.test(hl) || /^w\d+$/i.test(hl) || /^week\s*\d+/i.test(hl)) { weekCols.push(i); return; }
    fixedLeft.push(i);
  });
  totalPages = Math.max(1, Math.ceil(weekCols.length / MAX_WEEKS));
  currentPage = totalPages - 1; // show latest weeks by default
}

function renderTable() {
  const startW = currentPage * MAX_WEEKS;
  const visWeeks = weekCols.slice(startW, startW + MAX_WEEKS);
  const colOrder = [...fixedLeft, ...visWeeks, ...fixedRight];

  // HEAD
  let h = '<tr>';
  colOrder.forEach(i => {
    const label = tHeaders[i] || '';
    let cls = '';
    if (fixedRight.includes(i)) cls = 'th-ytd';
    else if (weekCols.includes(i)) cls = 'th-week';
    else if (i !== 0) cls = 'th-fy';
    h += '<th class="' + cls + '">' + label.replace(/\n/g,'<br>') + '</th>';
  });
  h += '</tr>';
  document.getElementById('thead').innerHTML = h;

  // BODY
  let b = '';
  tRows.forEach((row, ri) => {
    b += '<tr>';
    colOrder.forEach(ci => {
      const val = (row[ci] ?? '').toString().trim();
      const empty = val === '' || val === '0';
      if (ci === fixedLeft[0]) {
        b += '<td><span class="row-num">' + (ri+1) + '.</span>' + val + '</td>';
      } else if (fixedRight.includes(ci)) {
        b += '<td class="td-ytd">' + (val||'—') + '</td>';
      } else if (fixedLeft.includes(ci)) {
        b += '<td class="td-fy">' + (val||'—') + '</td>';
      } else {
        b += '<td class="' + (empty?'td-zero':'') + '">' + (val||'—') + '</td>';
      }
    });
    b += '</tr>';
  });
  document.getElementById('tbody').innerHTML = b;

  // FOOTER
  const total = weekCols.length;
  const from = startW + 1, to = Math.min(startW + MAX_WEEKS, total);
  document.getElementById('page-info').textContent =
    total > MAX_WEEKS ? ('Weeks ' + from + '–' + to + ' of ' + total) : (total + ' week' + (total!==1?'s':''));
  document.getElementById('btn-prev').disabled = currentPage === 0;
  document.getElementById('btn-next').disabled = currentPage >= totalPages - 1;
}

function changePage(dir) {
  currentPage = Math.max(0, Math.min(totalPages-1, currentPage+dir));
  renderTable();
}

function buildCharts(bottomData) {
  const { rows } = bottomData;
  const grid = document.getElementById('charts-grid');
  grid.innerHTML = '';
  Object.values(Chart.instances||{}).forEach(c => { try{c.destroy();}catch(e){} });

  // Group rows by metric name (col 0)
  const metrics = {}, order = [];
  rows.forEach(row => {
    const name = (row[0]||'').trim();
    if (!name) return;
    if (!metrics[name]) { metrics[name] = []; order.push(name); }
    metrics[name].push(row);
  });

  order.forEach((name, idx) => {
    const mRows = metrics[name];
    let achieved = null, remaining = null;

    mRows.forEach(r => {
      const label = (r[1]||'').toLowerCase().trim();
      const raw = (r[2]||'').toString().trim();
      const val = parseFloat(raw);
      if (isNaN(val)) return;
      if (label.includes('achiev')) achieved = val;
      else if (label.includes('remain')) remaining = val;
      else if (label === '') achieved = val;
    });

    // Only one value (no remaining) = big number card
    if (remaining === null) {
      const div = document.createElement('div');
      div.className = 'num-card';
      div.innerHTML = '<div class="chart-card-title">' + name + '</div>' +
        '<div class="num-inner"><div class="num-label">Achieved</div>' +
        '<div class="num-value">' + (achieved!=null ? achieved.toFixed(2) : '—') + '</div></div>';
      grid.appendChild(div);
      return;
    }

    // Donut chart — values are decimals (0.99), convert to percentage
    const achPct = Math.round(achieved * 100);
    const remPct = Math.round(remaining * 100);
    const cId = 'donut-' + idx;

    const div = document.createElement('div');
    div.className = 'donut-card';
    div.innerHTML =
      '<div class="chart-card-title">' + name + '</div>' +
      '<div class="donut-wrap">' +
        '<canvas id="' + cId + '"></canvas>' +
        '<div class="donut-center">' +
          '<span class="donut-center-label">Achieved</span>' +
          '<span class="donut-center-value">' + achPct + '%</span>' +
        '</div>' +
      '</div>' +
      '<div class="donut-legend">' +
        '<div class="donut-legend-item"><div class="donut-legend-dot" style="background:#1e88e5"></div>' + achPct + '%</div>' +
        '<div class="donut-legend-item"><div class="donut-legend-dot" style="background:#e2e8f0"></div>' + remPct + '%</div>' +
      '</div>';
    grid.appendChild(div);

    setTimeout(function() {
      const canvas = document.getElementById(cId);
      if (!canvas) return;
      new Chart(canvas, {
        type: 'doughnut',
        data: { datasets: [{ data: [achieved, remaining], backgroundColor: ['#1e88e5','#e2e8f0'], borderWidth: 0, hoverOffset: 3 }] },
        options: {
          cutout: '74%', responsive: true, maintainAspectRatio: true, animation: { duration: 500 },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function(ctx) {
              return ctx.dataIndex === 0 ? ' Achieved: ' + achPct + '%' : ' Remaining: ' + remPct + '%';
            }}}
          }
        }
      });
    }, 80 * (idx+1));
  });
}

async function init() {
  document.getElementById('loading-state').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('error-state').style.display = 'none';

  try {
    const [tRes, bRes] = await Promise.all([fetch(TABLE_CSV), fetch(BOTTOM_CSV)]);
    if (!tRes.ok) throw new Error('Table sheet fetch failed: HTTP ' + tRes.status);
    if (!bRes.ok) throw new Error('Bottom Data fetch failed: HTTP ' + bRes.status);
    const [tText, bText] = await Promise.all([tRes.text(), bRes.text()]);

    const td = parseCSV(tText), bd = parseCSV(bText);
    tHeaders = td.headers;
    tRows = td.rows;
    classifyColumns(tHeaders);

    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    renderTable();
    buildCharts(bd);

    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });

  } catch(err) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display = 'block';
    document.getElementById('error-state').innerHTML =
      '<div class="error-box"><div class="error-title">Could not load data</div>' +
      '<div class="error-msg">' + err.message + '<br><br>' +
      'Make sure both sheets are published to web as CSV:<br>' +
      '<strong>File → Share → Publish to web → [sheet] → CSV → Publish</strong></div></div>';
  }
}

init();
</script>
