<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBM Leading Indicator 2026</title>
<style>
  :root{
    --blue:#1c9ad6;
    --blue-dark:#1580b4;
    --blue-soft:#eaf6fc;
    --ring-bg:#dfe8ef;
    --ink:#2b3b46;
    --muted:#8aa0ad;
    --line:#e3ebf1;
    --card-bg:#ffffff;
    --page-bg:#f3f7fa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--page-bg);}
  body{
    font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    padding:22px 18px 30px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1500px;margin:0 auto;}

  .header{
    display:flex;align-items:baseline;justify-content:space-between;
    flex-wrap:wrap;gap:8px;margin-bottom:16px;
  }
  .title{
    font-size:24px;font-weight:700;color:var(--blue);letter-spacing:.2px;
  }
  .updated{font-size:12px;color:var(--muted);}

  /* ---------- TABLE ---------- */
  .table-card{
    background:var(--card-bg);border:1px solid var(--line);
    border-radius:14px;overflow:hidden;
    box-shadow:0 1px 3px rgba(20,60,90,.05);margin-bottom:22px;
  }
  .table-scroll{overflow-x:auto;}
  table{border-collapse:collapse;width:100%;font-size:13px;}
  thead th{
    background:var(--blue);color:#fff;font-weight:600;
    padding:10px 12px;text-align:center;white-space:nowrap;
    border-right:1px solid rgba(255,255,255,.18);
  }
  thead th:first-child{text-align:left;}
  thead th.subhead{white-space:pre-line;line-height:1.2;font-size:12px;font-weight:600;}
  tbody td{
    padding:9px 12px;text-align:center;white-space:nowrap;
    border-bottom:1px solid var(--line);border-right:1px solid var(--line);
    color:var(--ink);
  }
  tbody td:first-child{text-align:left;font-weight:600;}
  tbody tr:nth-child(even){background:#f8fbfd;}
  tbody tr:last-child td{border-bottom:none;}
  .col-fixed{background:#f1f6fa !important;font-weight:600;}
  thead th.col-fixed{background:var(--blue-dark) !important;}

  /* ---------- BOTTOM CARDS ---------- */
  .cards{
    display:grid;gap:16px;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  }
  .card{
    background:var(--card-bg);border:1px solid var(--line);
    border-radius:14px;padding:18px 18px 20px;
    box-shadow:0 1px 3px rgba(20,60,90,.05);
    display:flex;flex-direction:column;align-items:center;
  }
  .card h3{
    color:var(--blue);font-size:15px;font-weight:700;
    text-align:center;margin-bottom:14px;min-height:38px;
    display:flex;align-items:center;justify-content:center;
  }
  /* number card */
  .numbox{
    background:var(--blue-soft);border-radius:12px;width:100%;
    padding:34px 12px;text-align:center;
  }
  .numbox .lbl{
    color:var(--muted);font-size:12px;letter-spacing:2px;
    text-transform:uppercase;margin-bottom:14px;
  }
  .numbox .val{color:var(--blue);font-size:54px;font-weight:300;line-height:1;}

  /* donut */
  .donut-wrap{position:relative;width:170px;height:170px;}
  .donut-wrap svg{transform:rotate(0deg);width:100%;height:100%;}
  .donut-center{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;pointer-events:none;
  }
  .donut-center .c-lbl{color:var(--muted);font-size:13px;margin-bottom:2px;}
  .donut-center .c-val{color:var(--ink);font-size:30px;font-weight:700;}
  .legend{display:flex;gap:18px;margin-top:14px;font-size:13px;color:var(--ink);}
  .legend span{display:flex;align-items:center;gap:6px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

  .head-right{display:flex;align-items:center;gap:12px;}
  .refresh-btn{
    display:inline-flex;align-items:center;gap:7px;
    background:var(--blue);color:#fff;border:none;cursor:pointer;
    font:inherit;font-size:13px;font-weight:600;
    padding:8px 14px;border-radius:8px;line-height:1;
    transition:background .15s ease,opacity .15s ease;
  }
  .refresh-btn:hover{background:var(--blue-dark);}
  .refresh-btn:disabled{opacity:.6;cursor:default;}
  .refresh-btn svg{width:15px;height:15px;}
  .refresh-btn.loading svg{animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .state{
    text-align:center;color:var(--muted);font-size:14px;padding:30px;
  }
  .state.err{color:#c0392b;}
  @media (max-width:640px){
    .title{font-size:20px;}
    .numbox .val{font-size:44px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title">CBM Leading Indicator 2026</div>
    <div class="head-right">
      <div class="updated" id="updated"></div>
      <button class="refresh-btn" id="refreshBtn" type="button" title="Refresh now">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/>
        </svg>
        <span>Refresh</span>
      </button>
    </div>
  </div>

  <div class="table-card">
    <div class="table-scroll" id="tableHost">
      <div class="state">Loading table…</div>
    </div>
  </div>

  <div class="cards" id="cardsHost">
    <div class="state">Loading indicators…</div>
  </div>
</div>

<script>
/* ====== CONFIG ====== */
const TABLE_CSV  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS7BXWboA0f-czP-q2CPyjl-MI6IV9YdTUp5iATTPl-bIOTLyRAu3SbSvVnEp9y5gZZNa-8MGcZPYcn/pub?gid=1116424386&single=true&output=csv";
const BOTTOM_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS7BXWboA0f-czP-q2CPyjl-MI6IV9YdTUp5iATTPl-bIOTLyRAu3SbSvVnEp9y5gZZNa-8MGcZPYcn/pub?gid=1318273453&single=true&output=csv";
const WEEKS_TO_SHOW = 12;
const REFRESH_MS = 5 * 60 * 1000; // 5 minutes
const FIXED_COLS = 3; // Indicator, Yearly target, FY25

/* ====== CSV PARSER (handles quotes, commas, newlines) ====== */
function parseCSV(text){
  const rows=[]; let row=[]; let field=""; let i=0; let inQ=false;
  text = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  while(i<text.length){
    const c=text[i];
    if(inQ){
      if(c==='"'){
        if(text[i+1]==='"'){field+='"';i+=2;continue;}
        inQ=false;i++;continue;
      }
      field+=c;i++;continue;
    }
    if(c==='"'){inQ=true;i++;continue;}
    if(c===','){row.push(field);field="";i++;continue;}
    if(c==='\n'){row.push(field);rows.push(row);row=[];field="";i++;continue;}
    field+=c;i++;
  }
  row.push(field);rows.push(row);
  return rows.filter(r=>r.some(x=>String(x).trim()!==""));
}

async function fetchCSV(url){
  const bust = (url.includes("?")?"&":"?")+"_="+Date.now();
  const res = await fetch(url+bust,{cache:"no-store"});
  if(!res.ok) throw new Error("HTTP "+res.status);
  return parseCSV(await res.text());
}

/* ====== TABLE RENDER ====== */
function renderTable(rows){
  const host=document.getElementById("tableHost");
  if(!rows.length){host.innerHTML='<div class="state">No table data.</div>';return;}

  const header=rows[0];
  const body=rows.slice(1);

  const weekIdx=[];
  for(let c=FIXED_COLS;c<header.length;c++){
    if(String(header[c]).trim()!=="" && !isNaN(parseFloat(header[c]))) weekIdx.push(c);
  }

  let lastFilled=-1;
  weekIdx.forEach((c,pos)=>{
    const has=body.some(r=>r[c]!==undefined && String(r[c]).trim()!=="");
    if(has) lastFilled=pos;
  });
  if(lastFilled<0) lastFilled=weekIdx.length-1;

  const start=Math.max(0,lastFilled-(WEEKS_TO_SHOW-1));
  const visibleWeeks=weekIdx.slice(start,lastFilled+1);

  const cols=[...Array(FIXED_COLS).keys(),...visibleWeeks];

  let html="<table><thead><tr>";
  cols.forEach((c,idx)=>{
    const isFixed = idx<FIXED_COLS;
    const cls = (idx===1?" subhead":"") + (isFixed?" col-fixed":"");
    html+=`<th class="${cls.trim()}">${escapeHTML(header[c]||"")}</th>`;
  });
  html+="</tr></thead><tbody>";
  body.forEach(r=>{
    html+="<tr>";
    cols.forEach((c,idx)=>{
      const cls=idx<FIXED_COLS?' class="col-fixed"':'';
      html+=`<td${cls}>${escapeHTML(r[c]!==undefined?r[c]:"")}</td>`;
    });
    html+="</tr>";
  });
  html+="</tbody></table>";
  host.innerHTML=html;
}

/* ====== BOTTOM CARDS RENDER ====== */
function renderCards(rows){
  const host=document.getElementById("cardsHost");
  if(rows.length<2){host.innerHTML='<div class="state">No indicator data.</div>';return;}

  const header=rows[0].map(h=>String(h).trim().toLowerCase());
  const mi=header.indexOf("metric");
  const si=header.indexOf("status");
  const vi=header.indexOf("value");

  const order=[]; const groups={};
  rows.slice(1).forEach(r=>{
    const m=(r[mi]||"").trim(); if(!m) return;
    if(!groups[m]){groups[m]={};order.push(m);}
    groups[m][(r[si]||"").trim().toLowerCase()]=parseFloat(r[vi]);
  });

  host.innerHTML="";
  order.forEach(metric=>{
    const g=groups[metric];
    if("remaining" in g){
      host.appendChild(donutCard(metric,g.achieved,g.remaining));
    } else {
      host.appendChild(numberCard(metric,g.achieved));
    }
  });
}

function numberCard(title,value){
  const el=document.createElement("div");
  el.className="card";
  el.innerHTML=`
    <h3>${escapeHTML(title)}</h3>
    <div class="numbox">
      <div class="lbl">Achieved</div>
      <div class="val">${fmtNum(value)}</div>
    </div>`;
  return el;
}

function fmtNum(v){
  if(v===undefined||isNaN(v))return"–";
  return (Math.round(v*100)/100).toString();
}

function donutCard(title,achieved,remaining){
  const a=isNaN(achieved)?0:achieved;
  const rem=isNaN(remaining)?(1-a):remaining;
  const total=a+rem || 1;
  const aFrac=a/total;
  const rFrac=rem/total;

  const r=42, C=2*Math.PI*r, gapPx=4;
  const aLen=Math.max(0,aFrac*C-gapPx);
  const rLen=Math.max(0,rFrac*C-gapPx);
  const aStart=-90 + (gapPx/2)/C*360;
  const rStart=-90 + (gapPx/2 + aFrac*C + gapPx/2)/C*360;

  const pct = Math.round(aFrac*100);
  const remPct = 100-pct;

  const el=document.createElement("div");
  el.className="card";
  el.innerHTML=`
    <h3>${escapeHTML(title)}</h3>
    <div class="donut-wrap">
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--ring-bg)"
                stroke-width="11" stroke-dasharray="${rLen} ${C}" stroke-linecap="butt"
                transform="rotate(${rStart} 50 50)"/>
        <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--blue)"
                stroke-width="11" stroke-dasharray="${aLen} ${C}" stroke-linecap="butt"
                transform="rotate(${aStart} 50 50)"/>
      </svg>
      <div class="donut-center">
        <div class="c-lbl">Achieved</div>
        <div class="c-val">${pct}%</div>
      </div>
    </div>
    <div class="legend">
      <span><i class="dot" style="background:var(--blue)"></i>${pct}%</span>
      <span><i class="dot" style="background:var(--ring-bg)"></i>${remPct}%</span>
    </div>`;
  return el;
}

/* ====== HELPERS ====== */
function escapeHTML(s){
  return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}
function stamp(){
  const d=new Date();
  document.getElementById("updated").textContent="Updated "+d.toLocaleString();
}

async function load(){
  const btn=document.getElementById("refreshBtn");
  if(btn){btn.disabled=true;btn.classList.add("loading");}
  try{
    const [t,b]=await Promise.all([fetchCSV(TABLE_CSV),fetchCSV(BOTTOM_CSV)]);
    renderTable(t);
    renderCards(b);
    stamp();
  }catch(e){
    document.getElementById("tableHost").innerHTML=
      '<div class="state err">Could not load data. Check the sheet is published. ('+escapeHTML(e.message)+')</div>';
    document.getElementById("cardsHost").innerHTML="";
  }finally{
    if(btn){btn.disabled=false;btn.classList.remove("loading");}
  }
}

document.getElementById("refreshBtn").addEventListener("click",load);
load();
setInterval(load,REFRESH_MS);
</script>
</body>
</html>
